<!DOCTYPE html>
<html lang="en" data-mode="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Reset password — Substrukt</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/css/substrukt.css">
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      if (stored === 'light') {
        document.documentElement.setAttribute('data-mode', 'light');
      }
    })();
  </script>
</head>
<body style="background: var(--bg); color: var(--fg); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
  <div style="border: 1px solid var(--hairline); padding: 32px; width: 100%; max-width: 380px; position: relative;">
    <h1 style="font-family: var(--font-mono); font-weight: 800; font-size: 28px; letter-spacing: -0.02em; text-transform: uppercase; color: var(--fg-strong); margin: 0; text-align: center;">Substrukt</h1>
    <p style="color: var(--fg-muted); text-align: center; margin: 6px 0 24px; font-size: 13px;">Set a new password</p>
    {% if error %}
    <div class="wf-alert err" style="margin-bottom: 16px;"><div class="wf-alert-bar"></div><div>{{ error }}</div></div>
    {% endif %}
    <form method="post" action="/reset-password">
      <input type="hidden" name="_csrf" value="{{ csrf_token }}">
      <input type="hidden" name="token" value="{{ token }}">
      <div class="wf-field" style="margin-top: 16px;">
        <label class="wf-label" for="password">New password</label>
        <input class="wf-input" id="password" name="password" type="password" required autofocus autocomplete="new-password" minlength="8" style="width: 100%; margin-top: 4px;">
        <span class="wf-field-hint">At least 8 characters.</span>
      </div>
      <div class="wf-field" style="margin-top: 16px;">
        <label class="wf-label" for="confirm_password">Confirm password</label>
        <input class="wf-input" id="confirm_password" name="confirm_password" type="password" required autocomplete="new-password" minlength="8" style="width: 100%; margin-top: 4px;">
      </div>
      <button type="submit" class="wf-btn primary" style="width: 100%; margin-top: 18px;">
        Reset password
      </button>
    </form>
  </div>
</body>
</html>

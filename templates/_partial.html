<span id="page-title" hidden>{% block title %}Substrukt{% endblock %}</span>
{% if flash_kind %}
<div class="wf-alert wf-mb-4 {% if flash_kind == 'success' %}ok{% elif flash_kind == 'error' %}err{% else %}info{% endif %}">
  <div class="wf-alert-bar"></div>
  <div>{{ flash_message }}</div>
</div>
{% endif %}
{% block content %}{% endblock %}
<script>
  function addArrayItem(name, arrayDepth) {
    var container = document.getElementById('array-' + name);
    var tpl = document.getElementById('template-' + name);
    if (!container || !tpl) return;
    var index = 0;
    var directItems = container.querySelectorAll(':scope > .array-item');
    for (var i = 0; i < directItems.length; i++) {
      var idx = parseInt(directItems[i].getAttribute('data-index'), 10);
      if (idx >= index) index = idx + 1;
    }
    var ph = '__IDX_' + arrayDepth + '__';
    var m = tpl.innerHTML.replace(new RegExp(ph, 'g'), index);
    var div = document.createElement('div');
    div.className = 'array-item wf-framed';
    div.setAttribute('data-index', index);
    var header = document.createElement('div');
    header.style.cssText = 'display: flex; justify-content: flex-end; margin-bottom: 4px;';
    var removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.style.cssText = 'color: var(--err); cursor: pointer; background: none; border: none; font-size: 13px;';
    removeBtn.textContent = 'Remove';
    removeBtn.addEventListener('click', function() { div.remove(); });
    header.appendChild(removeBtn);
    div.appendChild(header);
    var frag = document.createDocumentFragment();
    var tmp = document.createElement('div');
    tmp.innerHTML = m;
    while (tmp.firstChild) frag.appendChild(tmp.firstChild);
    div.appendChild(frag);
    container.appendChild(div);
  }
</script>

<!DOCTYPE html>
<html lang="en" data-mode="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Email verification — Substrukt</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/css/substrukt.css">
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      if (stored === 'light') {
        document.documentElement.setAttribute('data-mode', 'light');
      }
    })();
  </script>
</head>
<body style="background: var(--bg); color: var(--fg); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
  <div style="border: 1px solid var(--hairline); padding: 32px; width: 100%; max-width: 380px; position: relative;">
    <h1 style="font-family: var(--font-mono); font-weight: 800; font-size: 28px; letter-spacing: -0.02em; text-transform: uppercase; color: var(--fg-strong); margin: 0; text-align: center;">Substrukt</h1>
    <div style="margin-top: 24px;">
    {% if success %}
      <div class="wf-alert ok" style="margin-bottom: 16px;"><div class="wf-alert-bar"></div><div>{{ message }}</div></div>
      <a href="/login" class="wf-btn primary" style="width: 100%; text-align: center; text-decoration: none; display: flex;">Log in</a>
    {% else %}
      <div class="wf-alert err" style="margin-bottom: 16px;"><div class="wf-alert-bar"></div><div>{{ message }}</div></div>
      <a href="/verify-pending" class="wf-btn primary" style="width: 100%; text-align: center; text-decoration: none; display: flex;">Request a new link</a>
    {% endif %}
    </div>
  </div>
</body>
</html>

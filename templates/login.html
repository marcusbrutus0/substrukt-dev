<!DOCTYPE html>
<html lang="en" data-mode="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Login — Substrukt</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/css/substrukt.css">
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      if (stored === 'light') {
        document.documentElement.setAttribute('data-mode', 'light');
      }
    })();
  </script>
</head>
<body style="background: var(--bg); color: var(--fg); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
  <div style="border: 1px solid var(--hairline); padding: 32px; width: 100%; max-width: 380px; position: relative;">
    <button style="position: absolute; top: 16px; right: 16px; color: var(--fg-muted); background: none; border: none; cursor: pointer;" onclick="var isLight=document.documentElement.getAttribute('data-mode')==='light';if(isLight){document.documentElement.removeAttribute('data-mode');localStorage.setItem('theme','dark')}else{document.documentElement.setAttribute('data-mode','light');localStorage.setItem('theme','light')};this.querySelector('.theme-icon').textContent=document.documentElement.getAttribute('data-mode')==='light'?'☾':'☀'">
      <span class="theme-icon">☀</span>
    </button>
    <script>(function(){var el=document.currentScript.previousElementSibling.querySelector('.theme-icon');el.textContent=document.documentElement.getAttribute('data-mode')==='light'?'☾':'☀'})()</script>
    <h1 style="font-family: var(--font-mono); font-weight: 800; font-size: 28px; letter-spacing: -0.02em; text-transform: uppercase; color: var(--fg-strong); margin: 0; text-align: center;">Substrukt</h1>
    <p style="color: var(--fg-muted); text-align: center; margin: 6px 0 24px; font-size: 13px;">Schema-driven content management</p>
    {% if error %}
    <div class="wf-alert err" style="margin-bottom: 16px;"><div class="wf-alert-bar"></div><div>
      {{ error }}
      {% if show_resend %}
      <br><a href="/verify-pending" style="text-decoration: underline;">Resend verification email</a>
      {% endif %}
    </div></div>
    {% endif %}
    <form method="post" action="/login">
      <input type="hidden" name="_csrf" value="{{ csrf_token }}">
      <div class="wf-field" style="margin-top: 16px;">
        <label class="wf-label" for="username">Username</label>
        <input class="wf-input" id="username" name="username" type="text" required autofocus autocomplete="username" value="{{ username }}" style="width: 100%; margin-top: 4px;">
      </div>
      <div class="wf-field" style="margin-top: 16px;">
        <label class="wf-label" for="password">Password</label>
        <input class="wf-input" id="password" name="password" type="password" required autocomplete="current-password" style="width: 100%; margin-top: 4px;">
      </div>
      <button type="submit" class="wf-btn primary" style="width: 100%; margin-top: 18px;">
        Log In
      </button>
    </form>
    <p style="text-align: center; margin-top: 16px; font-size: 13px;">
      <a href="/forgot-password" style="color: var(--fg-muted);">Forgot password?</a>
    </p>
  </div>
</body>
</html>
